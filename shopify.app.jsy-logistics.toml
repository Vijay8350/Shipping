# Shopify app config (CLAUDE.md §2, §10). This app is NON-EMBEDDED.
# Linked to "JSY Logistics" via `shopify app config link`. Push changes with
# `npm run deploy:shopify`.

client_id = "59e0cb799eae8389c240848841e37ee2"
name = "JSY Logistics"
application_url = "https://ship.apanjob.com"

# THE key fact: non-embedded. No App Bridge, no admin iframe (CLAUDE.md §2).
embedded = false

[access_scopes]
# Least-privilege start set (CLAUDE.md §10). Refine per feature in later phases.
scopes = "read_orders,write_orders,read_fulfillments,write_fulfillments,read_products,write_merchant_managed_fulfillment_orders"

[auth]
redirect_urls = [
  "https://ship.apanjob.com/auth/callback",
  "https://ship.apanjob.com/auth/login"
]

[webhooks]
api_version = "2025-10"

  # Mandatory GDPR/compliance webhooks (CLAUDE.md §9.5). HMAC-verified at /webhooks.
  [webhooks.privacy_compliance]
  customer_data_request_url = "https://ship.apanjob.com/webhooks"
  customer_deletion_url = "https://ship.apanjob.com/webhooks"
  shop_deletion_url = "https://ship.apanjob.com/webhooks"

# App Proxy (CLAUDE.md §10): storefront pages served from OUR domain through the proxy.
# Storefront URL https://<shop>/apps/ils/<path>  ->  https://ship.apanjob.com/proxy/<path>
[app_proxy]
url = "https://ship.apanjob.com/proxy"
subpath = "ils"
prefix = "apps"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
